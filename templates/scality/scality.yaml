                - tag: disk
                  value: '{#RINGNAME}'
            - uuid: ede7cbf84c7c4e569b49cd554bc7cb36
              name: '{#RINGNAME}: Ring Storage Total'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.37489.2.1.1.1.4.1.1.15.{#SNMPINDEX}'
              key: 'ring.stor.total.[{#SNMPINDEX}]'
              delay: 10m
              history: 7d
              value_type: FLOAT
              description: |
                MIB: scality.mib
                0 .. 18446744073709551615
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              tags:
                - tag: component
                  value: storage
                - tag: disk
                  value: '{#RINGNAME}'
            - uuid: a6b13aa4b50a44bab8db9799cc591cfe
              name: '{#RINGNAME}: Ring Storage Used'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.37489.2.1.1.1.4.1.1.13.{#SNMPINDEX}'
              key: 'ring.stor.used.[{#SNMPINDEX}]'
              delay: 10m
              history: 7d
              value_type: FLOAT
              description: |
                MIB: scality.mib
                0 .. 18446744073709551615
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              tags:
                - tag: component
                  value: storage
                - tag: disk
                  value: '{#RINGNAME}'
            - uuid: f0da2f5a847e43cdabb9621f7449ebe4
              name: '{#RINGNAME}: Server Not Running Well'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.37489.2.1.1.1.4.1.1.7.{#SNMPINDEX}'
              key: 'server.not.runing.well.[{#SNMPINDEX}]'
              history: 7d
              value_type: TEXT
              description: 'MIB: scality.mib'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              tags:
                - tag: component
                  value: storage
                - tag: disk
                  value: '{#RINGNAME}'
              trigger_prototypes:
