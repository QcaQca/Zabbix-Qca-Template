                MIB: scality.mib
                0 .. 18446744073709551615
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              tags:
                - tag: component
                  value: storage
                - tag: disk
                  value: '{#RINGNAME}'
            - uuid: a94f673d85024bd79a03c469ea4d7690
              name: '{#RINGNAME}: Ring Objects Total'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.37489.2.1.1.1.4.1.1.10.{#SNMPINDEX}'
              key: 'ring.obj.total.[{#SNMPINDEX}]'
              delay: 10m
              history: 7d
              value_type: FLOAT
              description: |
                MIB: scality.mib
                0 .. 18446744073709551615
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              tags:
                - tag: component
                  value: storage
                - tag: disk
                  value: '{#RINGNAME}'
            - uuid: 7d6be6d478004005941440d9d7468c49
              name: '{#RINGNAME}: Ring State OOS'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.37489.2.1.1.1.4.1.1.4.{#SNMPINDEX}'
              key: 'ring.state.OOS.[{#SNMPINDEX}]'
              history: 7d
              value_type: FLOAT
              description: |
                MIB: scality.mib
                true (1)
                false (2)
              valuemap:
                name: ringStateOOS
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              tags:
                - tag: component
