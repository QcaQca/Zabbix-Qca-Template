            - uuid: a0c95888254c4313922e6cee3dc7e1e2
              name: '{#RINGNAME}: Ring State Run'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.37489.2.1.1.1.4.1.1.3.{#SNMPINDEX}'
