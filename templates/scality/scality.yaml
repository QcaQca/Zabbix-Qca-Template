zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 846977d1dfed4968bc5f8bdb363285bc
      name: 'Templates/Operating systems'
  templates:
    - uuid: 039d30fa60b34d5a9640045a91ba9df7
      template: 'Scality SNMP'
      name: 'Scality SNMP'
      description: |
        Template scality SNMP
        MIBs used:
        scality.mib
        
        disable check on  snmp v2  "Use combined requests"
        https://github.com/QcaQca/Zabbix-Qca-Template
      groups:
        - name: 'Templates/Operating systems'
      items:
        - uuid: c1d132a9c1634729a32f4ec8c9283f47
          name: scality.server.not.running.well.count
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.37489.2.1.1.1.4.2.1.7.1
          key: scality.server.not.running.well.count
          value_type: CHAR
          description: 'MIB:scality.mib'
          tags:
            - tag: component
              value: supTable
          triggers:
            - uuid: 602549b738c6445580c6491773a7c2c8
              expression: 'last(/Scality SNMP/scality.server.not.running.well.count)=1'
              name: 'Liczba serwerow z awaria : {$LASTVALUE}'
              priority: AVERAGE
            - uuid: 4272b293a2a448898dc53a1685bd7708
              expression: 'last(/Scality SNMP/scality.server.not.running.well.count)>1'
              name: 'Liczba serwerow z awaria : {$LASTVALUE}'
              priority: HIGH
        - uuid: 6a649354a6cf4ca4af76799cb3eb9fc7
          name: scality.server.ok
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.37489.2.1.1.1.4.2.1.6.1
          key: scality.server.ok
          delay: 1h
          value_type: CHAR
          description: 'MIB:scality.mib'
          tags:
            - tag: component
              value: supTable
        - uuid: 32caff742ea940c5948af3420ffcd568
          name: scality.server.supervisor.addres
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.37489.2.1.1.1.4.2.1.4.1
          key: scality.server.supervisor.addres
          delay: 1h
          value_type: TEXT
          tags:
            - tag: component
              value: supTable
        - uuid: bc7b56ac635b4948821a8afd6ccfcf79
          name: scality.server.supervisor.availability
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.37489.2.1.1.1.4.2.1.8.1
          key: scality.server.supervisor.availability
          description: |
            true (1)
            false (2)
          valuemap:
            name: supAvailable
          tags:
            - tag: component
              value: supTable
          triggers:
            - uuid: 16782592585f40e1b03f5df53fe6ca00
              expression: 'last(/Scality SNMP/scality.server.supervisor.availability)<>1'
              name: 'Brak komunikacji z serwerem nadrzędnym'
              priority: HIGH
        - uuid: 0c8364ac87b1411a90714282d10dbc73
          name: scality.server.supervisor.name
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.37489.2.1.1.1.4.2.1.2.1
          key: scality.server.supervisor.name
          delay: 1h
          value_type: CHAR
          description: 'MIB:scality.mib'
          tags:
            - tag: component
              value: supTable
        - uuid: 28989a73118d44028bbd8058ac0e92f2
          name: scality.server.supervisor.port
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.37489.2.1.1.1.4.2.1.3.1
          key: scality.server.supervisor.port
          trends: '0'
          description: |
            MIB:scality.mib
            0 .. 65535
          tags:
            - tag: component
              value: supTable
        - uuid: 8f341f5526104258b2c01226f37a0a74
          name: scality.server.total
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.37489.2.1.1.1.4.2.1.5.1
          key: scality.server.total
          delay: 1h
          value_type: CHAR
          description: 'MIB:scality.mib'
          tags:
            - tag: component
              value: supTable
        - uuid: 71e673d30bcc491a9db2e16cde0803e2
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.4.0
          key: 'system.contact[sysContact.0]'
          delay: 1h
          history: 2w
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            The textual identification of the contact person for this managed node, together with information on how to contact this person.  If no contact information is known, the value is the zero-length string.
          inventory_link: CONTACT
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 6d59bfc308ee4f0aa73737078cfc1f5d
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.1.0
          key: 'system.descr[sysDescr.0]'
          delay: 15m
          history: 2w
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            A textual description of the entity. This value should
            include the full name and version identification of the system's hardware type, software operating-system, and
            networking software.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 009fcf3d8cc04d53a324954a954a3b38
          name: 'Uptime (hardware)'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.25.1.1.0
          key: 'system.hw.uptime[hrSystemUptime.0]'
          delay: 30s
          history: 2w
          trends: 0d
          units: uptime
          description: |
            MIB: HOST-RESOURCES-MIB
            The amount of time since this host was last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB [RFC1907] because sysUpTime is the uptime of the network management portion of the system.
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: 875abae14a0e4609be946273211acb3f
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.6.0
          key: 'system.location[sysLocation.0]'
          delay: 1h
          history: 2w
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            The physical location of this node (e.g., `telephone closet, 3rd floor').  If the location is unknown, the value is the zero-length string.
          inventory_link: LOCATION
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 080418b3fb9b426688086bbf6d0b6186
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.5.0
          key: system.name
          delay: 15m
          history: 2w
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            An administratively-assigned name for this managed node.By convention, this is the node's fully-qualified domain name.  If the name is unknown, the value is the zero-length string.
          inventory_link: NAME
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: c14c90011dfc461db194ae3071092c0f
              expression: 'last(/Scality SNMP/system.name,#1)<>last(/Scality SNMP/system.name,#2) and length(last(/Scality SNMP/system.name))>0'
              name: 'System name has changed'
              event_name: 'System name has changed (new name: {ITEM.VALUE})'
              priority: INFO
              description: 'System name has changed. Ack to close.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
                - tag: scope
                  value: security
        - uuid: b395d976c2254e4dbeb22c4c8184b71b
          name: 'Uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.3.0
          key: 'system.net.uptime[sysUpTime.0]'
          delay: 30s
          history: 2w
          trends: 0d
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            The time (in hundredths of a second) since the network management portion of the system was last re-initialized.
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: 500d95da898842a19326588b2a978032
          name: 'System object ID'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.2.0
          key: 'system.objectid[sysObjectID.0]'
          delay: 15m
          history: 2w
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            The vendor's authoritative identification of the network management subsystem contained in the entity.  This value is allocated within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones, Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier 1.3.6.1.4.1.4242.1.1 to its `Fred Router'.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
      discovery_rules:
        - uuid: 652d38cbe91945e69f976696aa4c66bb
          name: 'Ring devices discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#RINGNAME},.1.3.6.1.4.1.37489.2.1.1.1.4.1.1.2]'
          key: ring.dev.discovery
          delay: 10m
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: |
            MIB:scality.mib
            Ring devices are discovered
          item_prototypes:
            - uuid: a9795fdf350e4af3a8699124c139812b
              name: '{#RINGNAME}: Ring Disk Total'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.37489.2.1.1.1.4.1.1.9.{#SNMPINDEX}'
              key: 'ring.dev.disk.total.[{#SNMPINDEX}]'
              delay: 10m
              history: 7d
              value_type: FLOAT
              description: |
                MIB: scality.mib
                0 .. 18446744073709551615
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              tags:
                - tag: component
                  value: storage
                - tag: disk
                  value: '{#RINGNAME}'
            - uuid: ecdacd14722942c09cbc68469f9d7759
              name: '{#RINGNAME}: Ring Name'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.37489.2.1.1.1.4.1.1.2.{#SNMPINDEX}'
              key: 'ring.dev.name.[{#SNMPINDEX}]'
              delay: 1h
              history: 7d
              value_type: TEXT
              description: 'MIB: scality.mib'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              tags:
                - tag: component
                  value: storage
                - tag: disk
                  value: '{#RINGNAME}'
            - uuid: e1c84bbb097a4d7794da79301900d8f1
              name: '{#RINGNAME}: Ring Node Run'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.37489.2.1.1.1.4.1.1.6.{#SNMPINDEX}'
              key: 'ring.dev.node.run.[{#SNMPINDEX}]'
              history: 7d
              value_type: FLOAT
              description: 'MIB: scality.mib'
              tags:
                - tag: component
                  value: storage
                - tag: disk
                  value: '{#RINGNAME}'
            - uuid: f8e51689567f499d9e2e0cdc8a660e24
              name: '{#RINGNAME}: Ring Node Total'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.37489.2.1.1.1.4.1.1.5.{#SNMPINDEX}'
              key: 'ring.dev.node.total.[{#SNMPINDEX}]'
              delay: 10m
