                - tag: disk
                  value: '{#RINGNAME}'
            - uuid: 9d3477bd2dd542b9885096e53877b2dd
              name: '{#RINGNAME}: Ring Storage Available'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.37489.2.1.1.1.4.1.1.14.{#SNMPINDEX}'
              key: 'ring.stor.avil.[{#SNMPINDEX}]'
              delay: 10m
              history: 7d
              value_type: FLOAT
              description: |
                MIB: scality.mib
                0 .. 18446744073709551615
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              tags:
                - tag: component
