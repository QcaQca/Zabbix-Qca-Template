            - uuid: f31cdfc0457b42ab963d9ce140bed587
              name: '{#RINGNAME}: Ring Status'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.37489.2.1.1.1.4.1.1.8.{#SNMPINDEX}'
              key: 'ring.dev.status.[{#SNMPINDEX}]'
              history: 7d
              value_type: TEXT
              description: |
                MIB: scality.mib
                Monitors the current state of the whole ring. Possible states are RUN, BALANCING, LOOP
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              tags:
                - tag: component
                  value: storage
                - tag: disk
                  value: '{#RINGNAME}'
              trigger_prototypes:
                - uuid: 4604beac75604f808c61584b549ca3c2
                  expression: 'last(/Scality SNMP/ring.dev.status.[{#SNMPINDEX}])<>"RUN"'
                  name: 'RING STATUS <> RUN - CHECK RINGS'
                  priority: AVERAGE
            - uuid: 133a76a7e339451b9898fc7592001cb9
              name: '{#RINGNAME}: Ring Object Avg'
