              tags:
                - tag: component
                  value: volume
            - uuid: 423a52b52440458d8c3ce133acd27eb6
              name: 'raidLevelQualifier{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.3.1.6.{$SNMPINDEX}'
              key: 'raidLevelQualifier[{#SNMPINDEX}]'
              description: |
