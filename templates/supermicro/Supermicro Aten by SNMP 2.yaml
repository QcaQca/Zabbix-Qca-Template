                Raid level qaulifier of the volume.
              tags:
                - tag: component
                  value: volume
            - uuid: f036918eb3114bc3a2dc50261892ee0b
              name: 'secRaidLevel{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.3.1.7.{$SNMPINDEX}'
              key: 'secRaidLevel[{#SNMPINDEX}]'
              description: |
                MIB:ATEN-IPMI-MIB
                Secondary raid level of the volume.
              tags:
                - tag: component
                  value: volume
            - uuid: 11032c4a537d49baa3911ede06e3890a
              name: 'spanDepth{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.3.1.10.{$SNMPINDEX}'
              key: 'spanDepth[{#SNMPINDEX}]'
              description: |
                MIB:ATEN-IPMI-MIB
                Span depth of the volume.
              tags:
                - tag: component
                  value: volume
            - uuid: 56d9f5c587c5471d8f1c29875f9eadf8
              name: 'state{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.3.1.11.{$SNMPINDEX}'
              key: 'state[{#SNMPINDEX}]'
              description: |
                MIB:ATEN-IPMI-MIB
                State of the volume.
                0: offline
                1: partially degraded
                2: degraded
                3: optimal
              valuemap:
                name: volume.state
              tags:
                - tag: component
                  value: volume
            - uuid: 1ce0cb3f2ead4dfca8ae698411e8ea50
              name: 'volCapacity{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.3.1.4.{$SNMPINDEX}'
              key: 'volCapacity[{#SNMPINDEX}]'
              units: GB
              description: |
                MIB:ATEN-IPMI-MIB
                Capacity(GB) of the volume.
              tags:
                - tag: component
                  value: volume
            - uuid: 87eb3809a1354b328f8d41a9ef879cde
              name: 'volControllerNumber{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.3.1.2.{$SNMPINDEX}'
              key: 'volControllerNumber[{#SNMPINDEX}]'
              description: |
                MIB:ATEN-IPMI-MIB
                The controller that this HDD belongs to.
              tags:
                - tag: component
                  value: volume
            - uuid: c0720ce5b7d44e9faf71cb845347ad5d
              name: 'volName{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.3.1.12.{$SNMPINDEX}'
              key: 'volName[{#SNMPINDEX}]'
              value_type: TEXT
              description: |
                MIB:ATEN-IPMI-MIB
                The name of the volume.
              tags:
                - tag: component
                  value: volume
            - uuid: 85dd5b69cd284511a7231ebb24adfc63
              name: 'volNumber{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.3.1.1.{$SNMPINDEX}'
              key: 'volNumber[{#SNMPINDEX}]'
              description: |
                MIB:ATEN-IPMI-MIB
                A unique value, greater than zero, for each volume.  It
                is recommended that values are assigned contiguously
                starting from 1.
              tags:
                - tag: component
                  value: volume
            - uuid: d5637ea63f51408db3ea1099c43f0f2b
              name: 'volStatus{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.3.1.3.{$SNMPINDEX}'
              key: 'volStatus[{#SNMPINDEX}]'
              description: |
                MIB:ATEN-IPMI-MIB
                Current status of the volume.
                1: present
                0: not present
              valuemap:
                name: volStatus
              tags:
                - tag: component
                  value: volume
        - uuid: 056fdea866794b85af198e4694cb2769
          name: 'Voltage Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.4.1.21317.1.3.1.2,{#SENSOR_DESCR},1.3.6.1.4.1.21317.1.3.1.13]'
          key: voltage.discovery
          delay: 12h
          filter:
            conditions:
              - macro: '{#SENSOR_DESCR}'
                value: '*V*'
              - macro: '{#SNMPVALUE}'
                value: '[1-9]+'
          description: 'Scanning ATEN-IPMI-MIB::sensorTable with filter: voltage (Value = 0)'
          item_prototypes:
            - uuid: 74254cd9a9384dc5bc3e0cb54ff8de1d
              name: '{#SENSOR_DESCR}: Voltage, V'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.3.1.2.{#SNMPINDEX}'
              key: 'sensor.voltage.v[sensorReading.{#SNMPINDEX}]'
              delay: 5m
              value_type: FLOAT
              units: V
              description: |
                MIB: ATEN-IPMI-MIB
                A textual string containing information about the interface.
                This string should include the name of the manufacturer, the product name and the version of the interface hardware/software.
              tags:
                - tag: component
                  value: voltage
      tags:
        - tag: class
