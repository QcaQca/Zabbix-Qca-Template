zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 36bff6c29af64692839d077febfc7079
      name: 'Templates/Network devices'
  templates:
    - uuid: 8e02b71d47ee4b1e9631a7460da058a3
      template: 'Template SNMP QNAP'
      name: 'Template SNMP QNAP'
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: db9dc07dfdd448bb82d76218b6a43231
          name: 'Cache: Available percentage'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.4.1.1.1.3.2.0
          key: cache.available.percentage
          delay: 5m
          history: 7d
          trends: 7d
          tags:
            - tag: component
              value: cache
        - uuid: d201c0ada5de450fab94db5a1690d5dc
          name: 'Cache: Mode'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.10.17.0
          key: cache.mode
          history: 7d
          value_type: TEXT
          tags:
            - tag: component
              value: cache
        - uuid: a90e39cf710442c694f8e993d6e036ef
          name: 'Cache: RAID Type'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.10.16.0
          key: cache.raid.type
          delay: 1h
          history: 7d
          value_type: TEXT
          tags:
            - tag: component
              value: cache
        - uuid: 426d8a5e564344759500465dd195fc51
          name: 'Cache: Read hit rate'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.10.12.0
          key: cache.read.hit.rate
          delay: 5m
          history: 7d
          value_type: CHAR
          tags:
            - tag: component
              value: cache
        - uuid: c3ab201c4ebb45f28a9ad25f6bdcd4bc
          name: 'Cache: Type'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.10.15.0
          key: cache.type
          delay: 1h
          history: 7d
          value_type: CHAR
          tags:
            - tag: component
              value: cache
        - uuid: 3921ce3977724501843a739436179d38
          name: 'Cache: Write hit rate'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.10.13.0
          key: cache.write.hit.rate
          delay: 5m
          history: 7d
          value_type: CHAR
          tags:
            - tag: component
              value: cache
        - uuid: 8e80ab01a08b41a3b8249ca1d822be05
          name: 'CPU: Temperature'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.4.1.1.1.1.4.2.0
          key: cpu.temp
          delay: 30m
          history: 7d
          trends: 7d
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 8aabd00d59b749df970ad414a43d31af
              expression: 'min(/Template SNMP QNAP/cpu.temp,15m)>={$CPU_TEMPERATURE_ALARM}'
              name: 'High CPU temperature (>{$CPU_TEMPERATURE_ALARM} for 15m)'
              opdata: 'Current temperature: {ITEM.VALUE}'
              priority: WARNING
              description: 'The CPU temperature is exceeding the threshold.'
        - uuid: 448d8d6e4c504f71ae945f39465ec013
          name: 'CPU: Type'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.25.3.2.1.3.196608
          key: cpu.type
          delay: 1h
          history: 7d
          value_type: TEXT
          tags:
            - tag: component
              value: system
        - uuid: 0cac7c2bfbbf488fb9aaac8da0ad3e26
          name: 'Disk: Overall IOPS'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.4.1.11.5.6.2.1.3.1
          key: disk.iops
          delay: 15m
          history: 7d
          trends: 7d
          tags:
            - tag: component
              value: disk
        - uuid: c0dcd10180834d4ebe4963f368defc6c
          name: 'Disk: Overall latency'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.4.1.11.5.6.2.1.4.1
          key: disk.latency
          delay: 15m
          history: 7d
          trends: 7d
          tags:
            - tag: component
              value: disk
          triggers:
            - uuid: 04529cd8fa294e108cd9ef563fa2d107
              expression: 'min(/Template SNMP QNAP/disk.latency,15m)>={$DISK_LATENCY_ALARM}'
              name: 'Disk latency is high (>{$DISK_LATENCY_ALARM} for 15m)'
              opdata: 'Current latency: {ITEM.VALUE}'
              priority: WARNING
              description: 'The latency of the disks are higher than the threshhold for 15 minutes.'
        - uuid: 9bb3bb9f91e64d538a37f1c566698350
          name: 'Device system name'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.24681.1.3.13.0
          key: HostNameEX
          history: 90d
          value_type: TEXT
          description: 'Host name'
          tags:
            - tag: Application
              value: System
        - uuid: ab1f16345be545f481fa9c1e04545a58
          name: 'Device model name'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.24681.1.3.12.0
          key: ModelNameEX
          delay: '10800'
          history: 90d
          value_type: TEXT
          tags:
            - tag: Application
              value: System
        - uuid: a3e0b84494a64662bc14f67b2183d199
          name: 'Device firmware revision'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.47.1.1.1.1.9.1
          key: PhysicalFirmwareRev
          delay: '3600'
          history: 90d
          value_type: TEXT
          inventory_link: SOFTWARE
          tags:
            - tag: Application
              value: System
          triggers:
            - uuid: afe5f32dafc6416ea957ff42e69e483b
              expression: '(last(/Template SNMP QNAP/PhysicalFirmwareRev,#1)<>last(/Template SNMP QNAP/PhysicalFirmwareRev,#2))>0'
              name: 'Firmware on {HOST.NAME} is changed'
              priority: INFO
        - uuid: 4e1e045bf78349a38a84801376681acd
          name: 'Device hardware revision'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.47.1.1.1.1.8.1
          key: PhysicalHardwareRev
          delay: '10800'
          history: 90d
          value_type: TEXT
          inventory_link: HARDWARE
          tags:
            - tag: Application
              value: System
        - uuid: 151426316599442ca4d6ba51974add82
          name: 'Device software revision'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.47.1.1.1.1.10.1
          key: PhysicalSoftwareRev
          delay: '3600'
          history: 90d
          value_type: TEXT
          tags:
            - tag: Application
              value: System
        - uuid: d5446fe69a044c2cb5a6499957925bad
          name: 'System FAN Status'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.4.1.1.1.1.2.2.1.4.1
          key: qnap.systemFanStatus
          history: 90d
          description: 'Returns error if fan fails.'
          tags:
            - tag: Application
              value: CPU
            - tag: Application
              value: 'QNAP Health'
            - tag: Application
              value: 'QNAP System'
          triggers:
            - uuid: 462b6670b8c64de9a28b0223cf2a6654
              expression: 'last(/Template SNMP QNAP/qnap.systemFanStatus)<>0'
              name: 'System Fan Status CRITCAL on {HOST.NAME}'
              priority: WARNING
        - uuid: aab670b56dda4c2892a1af4c1c7250df
          name: 'Device vendor name'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.47.1.1.1.1.12.1
          key: sysPhysicalMfgName
          delay: '3600'
          history: 90d
          value_type: TEXT
          inventory_link: VENDOR
          tags:
            - tag: Application
              value: System
        - uuid: f275edb80ddb4543993e5c59aba70acb
          name: 'Number of CPUs'
          type: SCRIPT
          key: system.cpu.num
          delay: 12h
          history: 90d
          units: szt
          params: |
            using Lextm.SharpSnmpLib;
            using Lextm.SharpSnmpLib.Messaging;
            using Lextm.SharpSnmpLib.Security;
            using System;
            using System.Collections.Generic;
            using System.Linq;
            using System.Net;
            using System.Text;
            using System.Threading.Tasks;
            
            namespace ConsoleApplication
            {
              class Program
              {
                static void Main(string[] args)
                {
            
                  var result = new List<Variable>();
                  Messenger.BulkWalk(VersionCode.V2,
                                 new IPEndPoint(IPAddress.Parse("{HOST.CONN}"), 161),
                                 new OctetString("public"),
                                 new ObjectIdentifier("1.3.6.1.2.1.25.3.3.1.2"),
                                 result,
                                 6000,
                                 10,
                                 WalkMode.WithinSubtree,
                                 null,
                                 null);
                }
              }
            }
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: cpu
        - uuid: 8acdfa9f54ac4c1bb1467390408dd807
          name: 'System: Firmware update available'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.12.7.0
          key: system.firmware.update.available
          delay: 1h
          history: 7d
          trends: 7d
          valuemap:
            name: 'Firmware Version Available'
          tags:
            - tag: component
              value: health
            - tag: component
              value: system
          triggers:
            - uuid: 575180a76d8c4fa580bcf66e14162aa4
              expression: 'last(/Template SNMP QNAP/system.firmware.update.available)=1'
              name: 'A firmware update is available'
              priority: INFO
              description: 'A new firmware update is available to install. It is recommended to update accordingly.'
              manual_close: 'YES'
        - uuid: beb04f60f5d24cffa38eb977b82e322f
          name: 'System: Firmware version'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.12.6.0
          key: system.firmware.version
          history: 7d
          value_type: TEXT
          inventory_link: SERIALNO_B
          tags:
            - tag: component
              value: system
        - uuid: 5cc0c5ba18ea435587fbecbe672020fe
          name: 'System: Hostname'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.12.4.0
          key: system.host.name
          delay: 2h
          history: 7d
          value_type: TEXT
          inventory_link: NAME
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: a4aa477cb9bf48b68e22ea7ecbf330e6
              expression: 'last(/Template SNMP QNAP/system.host.name,#1)<>last(/Template SNMP QNAP/system.host.name,#2) and length(last(/Template SNMP QNAP/system.host.name))>0'
              name: 'Hostname has ben rename'
              priority: INFO
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
        - uuid: a9f191010d4d43d0934fa7490dd85cdc
          name: 'Total memory'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.2.2.0
          key: system.mem.total
          delay: 1h
          history: 90d
          value_type: FLOAT
          units: MB
          preprocessing:
            - type: REGEX
              parameters:
                - '([0-9]+\.[0-9]+)'
                - \1
          tags:
            - tag: Application
              value: System
          triggers:
            - uuid: 68074e16f78c40fcb9faa7e09158cc70
              expression: 'last(/Template SNMP QNAP/system.mem.total,#1)<last(/Template SNMP QNAP/system.mem.total,#2)'
              name: 'Memory decrease'
              priority: WARNING
            - uuid: 0fd905e405b24da8a136a852e72b7896
              expression: 'last(/Template SNMP QNAP/system.mem.total,#1)>last(/Template SNMP QNAP/system.mem.total,#2)'
              name: 'Memory increase'
              priority: INFO
        - uuid: 7de6123a743941deb23b0a8070acc49c
          name: 'Memory usage'
          type: CALCULATED
          key: system.mem.usage
          history: 90d
          value_type: FLOAT
          units: '%'
          params: '((last(//system.mem.total)-last(//system.mem.free))/last(//system.mem.total))*100'
          tags:
            - tag: Application
              value: System
          triggers:
            - uuid: fb74d673afc34f09ae680cd1f17211ce
              expression: 'min(/Template SNMP QNAP/system.mem.usage,5m)>{$MEMORY.UTIL.MAX}'
              name: 'High memory utilization (>{$MEMORY.UTIL.MAX}% for 5m)'
              priority: AVERAGE
        - uuid: 37648695d8584ccaa959bf045c2f142e
          name: 'Virtual memory'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.2.2.0
          key: system.mem.virtual
          history: 90d
          value_type: FLOAT
          units: MB
          preprocessing:
            - type: REGEX
              parameters:
                - '([0-9]+\.[0-9]+)'
                - \1
          tags:
            - tag: Application
              value: System
        - uuid: e0236209a5d14136a9cddfea7cffa404
          name: 'System: Serial no.'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.12.5.0
          key: system.serial.number
          delay: 2h
          history: 7d
          value_type: TEXT
          inventory_link: SERIALNO_A
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: aa079478a8b54e22ad7bc07e0b43f928
              expression: 'last(/Template SNMP QNAP/system.serial.number,#1)<>last(/Template SNMP QNAP/system.serial.number,#2) and length(last(/Template SNMP QNAP/system.serial.number))>0'
              name: 'Device has been replaced'
              event_name: 'Device has been replaced (new serial number received)'
              priority: INFO
              description: 'Device serial number has changed. Ack to close'
              tags:
                - tag: scope
                  value: notice
        - uuid: 760f3e77604c4d5fae4ed7c7ce22887c
          name: 'System: Temperature'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.4.1.1.1.1.1.2.1.7.1
          key: system.temp
          delay: 30m
          history: 7d
          trends: 7d
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 6cc9304a5d9a465aa88a92af9168f44c
              expression: 'avg(/Template SNMP QNAP/system.temp,#4)>60'
              name: 'System Temperature CRITICAL on {HOST.NAME}'
              priority: AVERAGE
        - uuid: 10928adab31a489f93d44f829da64bf4
          name: 'System: Uptime'
          type: SNMP_AGENT
          snmp_oid: iso.3.6.1.2.1.1.3.0
          key: system.uptime
          delay: 10m
          history: 90d
          units: uptime
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: 342e8875b501417d960ae502245ad57f
          name: 'CPU usage'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.24681.1.3.1.0
          key: SystemCPU-UsageEX
          history: 90d
          units: '%'
          description: 'System CPU usage'
          tags:
            - tag: Application
              value: System
          triggers:
            - uuid: 9efe86f0bf69484a8ea8251deef949c8
              expression: 'min(/Template SNMP QNAP/SystemCPU-UsageEX,15m)>80'
              name: 'CPU utilization on {HOST.NAME} is over 80% for 15 min'
              priority: WARNING
            - uuid: 0f3c8a432f494f949cd26c975ababa50
              expression: 'min(/Template SNMP QNAP/SystemCPU-UsageEX,15m)>95'
              name: 'CPU utilization on {HOST.NAME} is over 95% for 15 min'
              priority: AVERAGE
        - uuid: be02baf294f64e2c9815563b680d2826
          name: 'System temperature'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.24681.1.3.6.0
          key: SystemTemperatureEX
          history: 90d
          units: C
          description: 'System temperature in centigrade'
          tags:
            - tag: Application
              value: System
        - uuid: ad72d5774342441dac547c35238b4c0a
          name: 'System uptime'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.25.1.1.0
          key: sysUptime
          history: 90d
          units: uptime
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: Application
              value: System
          triggers:
            - uuid: 46e56c0ceb904fdb8c2d9f17d296ef59
              expression: 'change(/Template SNMP QNAP/sysUptime)<0'
              name: '{HOST.NAME} has just been restarted'
              priority: HIGH
        - uuid: 7ce8b2c3b49a49ec8a7d5263027adea9
          name: 'SNMP agent availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          history: 7d
          description: |
            Availability of SNMP checks on the host. The value of this item corresponds to availability icons in the host list.
            Possible value:
            0 - not available
            1 - available
            2 - unknown
          tags:
            - tag: component
              value: availability
            - tag: component
              value: health
          triggers:
            - uuid: c1e220b3829b430c8d6bf4e0fe23189f
              expression: 'max(/Template SNMP QNAP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'No SNMP data collection'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: DISASTER
              description: 'SNMP is not available for polling. Please check device connectivity and SNMP settings.'
      discovery_rules:
        - uuid: 95d8e0c6366048388e7d49d0aab90fe7
          name: 'CPU Core Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#CPUINDEX},1.3.6.1.4.1.24681.1.4.1.1.1.1.4.3.1.1]'
          key: cpu.discovery
          delay: 1h
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 787fea1eac8f4f3c99d17e0a2aff0c54
              name: 'CPU Core {#CPUINDEX}: Usage'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.1.4.3.1.3.{#CPUINDEX}'
              key: 'cpu.core.usage[{#CPUINDEX}]'
              delay: 5m
              history: 7d
              trends: 7d
              units: '%'
              tags:
                - tag: application
                  value: system
          graph_prototypes:
            - uuid: 91603aa0798346e790fbc0a92e669983
              name: 'Ilość cpu'
              graph_items:
                - color: FFEB3B
                  calc_fnc: ALL
                  item:
                    host: 'Template SNMP QNAP'
                    key: 'cpu.core.usage[{#CPUINDEX}]'
        - uuid: 60c4cb5dca434c599228bf36a91ce5a3
          name: 'CPU Type Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#CPUINDEX},1.3.6.1.2.1.25.3.2.1.3.196608]'
          key: cpu.type.discovery
          delay: 12h
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 7cab5c45fea44b2aaa46fcb86da3cc84
              name: 'CPU Type Core {#CPUINDEX}'
              type: SNMP_AGENT
              snmp_oid: 1.3.6.1.2.1.25.3.2.1.3.196608
              key: 'cpu.type.core[{#CPUINDEX}]'
              delay: 12h
              value_type: TEXT
              tags:
                - tag: component
                  value: system
        - uuid: a0865e09fea2466aa11a8bf7b4b17de6
          name: 'Disk Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#HDDINDEX},1.3.6.1.4.1.55062.1.10.2.1.1,{#HDDSLOT},1.3.6.1.4.1.55062.1.10.2.1.2]'
          key: disk.discovery
          delay: 1h
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: a7a0ea70f9ba44718a944342bfc7804f
              name: 'HDD {#HDDSLOT}: Capacity'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.55062.1.10.2.1.9.{#HDDINDEX}'
              key: 'hdd.capacity[{#HDDINDEX}]'
              delay: 1h
              history: 7d
              trends: 7d
              units: B
              tags:
                - tag: component
                  value: disk
            - uuid: 0f94704f57744ea29dd53a4f94ef6bb1
              name: 'HDD {#HDDSLOT}: IOPS'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.11.5.6.2.1.3.{#HDDINDEX}'
              key: 'hdd.iops[{#HDDINDEX}]'
              delay: 5m
              history: 7d
              trends: 7d
            - uuid: 0a1e89075e654411aa7794d33f73879c
              name: 'HDD {#HDDSLOT}: Latency'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.11.5.6.2.1.4.{#HDDINDEX}'
              key: 'hdd.latency[{#HDDINDEX}]'
              delay: 5m
              history: 7d
              trends: 7d
              trigger_prototypes:
                - uuid: 3fa8debcb8f1473782d3f10910b6a04d
                  expression: 'min(/Template SNMP QNAP/hdd.latency[{#HDDINDEX}],15m)>{$DISK_LATENCY_ALARM}'
                  name: 'Disk latency is high (>{$DISK_LATENCY_ALARM}ms for 15 m) on HDD {#HDDSLOT}'
                  opdata: 'Current latency: {ITEM.VALUE}'
                  priority: AVERAGE
                  description: 'The latency of the disk is higher than the threshhold for 15 minutes.'
                  manual_close: 'YES'
            - uuid: 44b58cc498dc4ad0a49857d70227f7e9
              name: 'HDD {#HDDSLOT}: Model'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.55062.1.10.2.1.4.{#HDDINDEX}'
              key: 'hdd.model[{#HDDINDEX}]'
              delay: 1h
              history: 7d
              value_type: TEXT
              tags:
                - tag: component
                  value: disk
            - uuid: f9c1ed91e6f541919686ad8c0df5e93c
              name: 'HDD {#HDDSLOT}: Serial no.'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.55062.1.10.2.1.5.{#HDDINDEX}'
              key: 'hdd.serial[{#HDDINDEX}]'
              delay: 1h
              history: 7d
              value_type: CHAR
              description: 'Returns the serial number of disk (e.g: S2AM8ZSB).'
            - uuid: 7e5eefbc66e44001a3dc355672140ea7
              name: 'HDD {#HDDSLOT}: State'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.55062.1.10.2.1.7.{#HDDINDEX}'
              key: 'hdd.state[{#HDDINDEX}]'
              delay: 5m
