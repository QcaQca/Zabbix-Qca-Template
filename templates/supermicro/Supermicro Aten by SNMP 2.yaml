zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: e960332b3f6c46a1956486d4f3f99fce
      name: 'Templates/Server hardware'
  templates:
    - uuid: cf0947cc05d3450b9a6d66b2eb180482
      template: 'Supermicro Aten by SNMP'
      name: 'Supermicro Aten by SNMP'
      description: |
        Template Server Supermicro Aten
        
        MIBs used:
        HOST-RESOURCES-MIB
        SNMPv2-MIB
        ATEN-IPMI-MIB
        
        Generated by official Zabbix template tool "Templator"
      vendor:
        name: Zabbix
        version: 7.4-2
      groups:
        - name: 'Templates/Server hardware'
      items:
        - uuid: c3ddff7d9c204082a044c55ebf19dbe4
          name: 'Bios version'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.21317.1.5.4.0]'
          key: bios.vesion
          delay: 12h
          value_type: FLOAT
          trends: '0'
          description: |
            MIB:ATEN-IPMI-MIB
            BIOS Vesion
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 6439bd0c171244729afafbdf40323c1e
          name: 'Bmc Build Vesion'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.21317.1.5.7.0]'
          key: bmc.uild.Vesion
          delay: 12h
          value_type: FLOAT
          trends: '0'
          description: |
            MIB:ATEN-IPMI-MIB
            BMC Build Vesion
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: a160968c9ae147d38872748cba8beb14
          name: 'Host name'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.21317.1.5.6.0]'
          key: host.name
          delay: 1h
          value_type: CHAR
          description: |
            MIB:ATEN-IPMI-MIB
            BIOS Vesion
          inventory_link: ALIAS
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: name
            - tag: component
              value: system
        - uuid: cadc501d69624baa8ad292c2c8f6fd52
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          value_type: LOG
          description: 'The item is used to collect all SNMP traps unmatched by other snmptrap items'
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          tags:
            - tag: component
              value: network
        - uuid: ccba865de57a41718b53ff1f82b2ca87
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.4.0]'
          key: 'system.contact[sysContact.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            The textual identification of the contact person for this managed node, together with information on how to contact this person. If no contact information is known, the value is the zero-length string.
          inventory_link: CONTACT
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 70f51b4370c64c2bab2c811359ef690b
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.1.0]'
          key: 'system.descr[sysDescr.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            A textual description of the entity. This value should
            include the full name and version identification of the system's hardware type, software operating-system, and
            networking software.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: bc74f1c928f54c61a246065fd583ef31
          name: 'Serial number'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.21317.1.6.1.0
          key: system.hw.serialnumber
          delay: 1h
          value_type: CHAR
          inventory_link: SERIALNO_A
          tags:
            - tag: component
              value: inventory
        - uuid: 8b0320157a0144a0b2f1d7df7cbbe08a
          name: 'Uptime (hardware)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.25.1.1.0]'
          key: 'system.hw.uptime[hrSystemUptime.0]'
          delay: 30s
          trends: '0'
          units: uptime
          description: |
            MIB: HOST-RESOURCES-MIB
            The amount of time since this host was last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB [RFC1907] because sysUpTime is the uptime of the network management portion of the system.
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: 52169be1d3924c638476a290590066f3
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.6.0]'
          key: 'system.location[sysLocation.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            Physical location of the node (e.g., `equipment room`, `3rd floor`). If not provided, the value is a zero-length string.
          inventory_link: LOCATION
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: afa2acff36034dccb96a1946e7039f39
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.5.0]'
          key: system.name
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            An administratively-assigned name for this managed node.By convention, this is the node's fully-qualified domain name. If the name is unknown, the value is the zero-length string.
          inventory_link: NAME
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 07b7a49bffea4c03a022eed632754f47
              expression: 'last(/Supermicro Aten by SNMP/system.name,#1)<>last(/Supermicro Aten by SNMP/system.name,#2) and length(last(/Supermicro Aten by SNMP/system.name))>0'
              name: 'Supermicro Aten: System name has changed'
              event_name: 'Supermicro Aten: System name has changed (new name: {ITEM.VALUE})'
              priority: INFO
              description: 'The name of the system has changed. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
                - tag: scope
                  value: security
        - uuid: cc33c0e22893432280d642c75020a222
          name: 'Uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.3.0]'
          key: 'system.net.uptime[sysUpTime.0]'
          delay: 30s
          trends: '0'
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            Time (in hundredths of a second) since the network management portion of the system was last re-initialized.
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: a0c0d3ee729b4a159719271232024b45
          name: 'System object ID'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.2.0]'
          key: 'system.objectid[sysObjectID.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            The vendor's authoritative identification of the network management subsystem contained in the entity. This value is allocated within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones, Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier 1.3.6.1.4.1.4242.1.1 to its `Fred Router'.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: e205f1aa96a448a2955e988fa8528600
          name: 'SNMP agent availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          description: |
            Availability of SNMP checks on the host. The value of this item corresponds to availability icons in the host list.
            Possible values:
            0 - not available
            1 - available
            2 - unknown
          valuemap:
            name: zabbix.host.available
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: caeb9732846b4ae586ee103ac0c4a65b
              expression: 'max(/Supermicro Aten by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'Supermicro Aten: No SNMP data collection'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'SNMP is not available for polling. Please check device connectivity and SNMP settings.'
              tags:
                - tag: scope
                  value: availability
      discovery_rules:
        - uuid: e31995e21b3942e58b7ed451f57f0360
          name: 'FAN Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.4.1.21317.1.3.1.2,{#SENSOR_DESCR},1.3.6.1.4.1.21317.1.3.1.13]'
          key: fan.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#SENSOR_DESCR}'
                value: 'FAN.*'
              - macro: '{#SNMPVALUE}'
                value: '[1-9]+'
          description: 'Scanning ATEN-IPMI-MIB::sensorTable with filter: not connected FAN sensors (Value = 0)'
          item_prototypes:
            - uuid: 5309e5fab7a44b11a8f045db2868a544
              name: '{#SENSOR_DESCR}: Fan speed, %'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.21317.1.3.1.2.{#SNMPINDEX}]'
              key: 'sensor.fan.speed.percentage[sensorReading.{#SNMPINDEX}]'
              units: '%'
              description: |
                MIB: ATEN-IPMI-MIB
                A textual string containing information about the interface.
                This string should include the name of the manufacturer, the product name and the version of the interface hardware/software.
              tags:
                - tag: component
                  value: fan
        - uuid: 7c9cd13eb5014e6b970413c88d06ce36
          name: 'HDD Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.4.1.21317.1.7.2.1.1]'
          key: hdd.discovery
          delay: 12h
          description: 'MIB:ATEN-IPMI-MIB'
          item_prototypes:
            - uuid: f51b0bd25882414db472f63ca980a586
              name: 'capacity{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.2.1.6.{$SNMPINDEX}'
              key: 'capacity.[{#SNMPINDEX}]'
              units: GB
              description: |
                MIB:ATEN-IPMI-MIB
                Capacity(GB) of the HDD.
              tags:
                - tag: component
                  value: hdd
            - uuid: 43a042588260423abb7f0d5d213f99dc
              name: 'enclosureNumber{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.2.1.3.{$SNMPINDEX}'
              key: 'enclosure.Number.[{#SNMPINDEX}]'
              description: |
                MIB:ATEN-IPMI-MIB
                The enclosure that this HDD belongs to.
              tags:
                - tag: component
                  value: hdd
            - uuid: 8a73413048ba4ed388bab29f6ccd4532
              name: 'fwState{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.2.1.12.{$SNMPINDEX}'
              key: 'fwState.[{#SNMPINDEX}]'
              trends: '0'
              description: |
                MIB:ATEN-IPMI-MIB
                The firmware state of the HDD.
                00: Unconfigured good drive
                01: Unconfigured bad drive
                02: Hot spare drive
                16: Configured-good drive(data invalid)
                17: Configured-bad drive (data invalid)
                20: Configured-drive is rebuilding
                24: Configured-drive is online
                32: drive is getting copied
                64: drive is exposed and controlled by host
                128: UnConfigured - shielded
                130: Hot Spare - shielded
                144: Configured - shielded
              valuemap:
                name: hdd.fwState
              tags:
                - tag: component
                  value: hdd
            - uuid: bd9c4d7e0e1849c38f8b03ebcf1ae1e6
              name: 'hddControllerNumber {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.2.1.2.{$SNMPINDEX}'
              key: 'hdd.Controller.Number.[{#SNMPINDEX}]'
              description: |
                MIB:ATEN-IPMI-MIB
                The controller that this HDD belongs to.
              tags:
                - tag: component
                  value: hdd
            - uuid: 5ff9016e690e4cbf974bd8d97a563eb1
              name: 'hddNumber {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.2.1.1.{$SNMPINDEX}'
              key: 'hdd.number.[{#SNMPINDEX}]'
              description: |
                MIB:ATEN-IPMI-MIB
                A unique value, greater than zero, for each HDD.  It
                is recommended that values are assigned contiguously
                starting from 1.
              tags:
                - tag: component
                  value: hdd
            - uuid: bf6087ba9d4f4ec6896afd7c80b5d251
              name: 'linkSpeed{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.2.1.11.{$SNMPINDEX}'
              key: 'linkSpeed.[{#SNMPINDEX}]'
              trends: '0'
              description: |
                MIB:ATEN-IPMI-MIB
                The link speed of the HDD.
                0: not defined
                1: 1.5Gb/s - SATA 150
                2: 3.0Gb/s
                3: 6.0Gb/s
                4: 12.0Gb/s
              valuemap:
                name: hdd.linkSpeed
              tags:
                - tag: component
                  value: hdd
            - uuid: 88fd7a68878c4ceab635e54dda2392ce
              name: 'mediaErrCount{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.2.1.15.{$SNMPINDEX}'
              key: 'mediaErrCount.[{#SNMPINDEX}]'
              description: |
                MIB:ATEN-IPMI-MIB
                Media error Count of the HDD.
              tags:
                - tag: component
                  value: hdd
            - uuid: bd8677b4d34f490a960c41fc392e4cc2
              name: 'modelName{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.2.1.8.{$SNMPINDEX}'
              key: 'modelName.[{#SNMPINDEX}]'
              value_type: TEXT
              description: |
                MIB:ATEN-IPMI-MIB
                Model name of the HDD.
              tags:
                - tag: component
                  value: hdd
            - uuid: 583011227b87429b98cbceb94ed59a11
              name: 'otherErrCount{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.2.1.13.{$SNMPINDEX}'
              key: 'otherErrCount.[{#SNMPINDEX}]'
              description: |
                MIB:ATEN-IPMI-MIB
                Other error count of the HDD.
              tags:
                - tag: component
                  value: hdd
            - uuid: 078f27b546eb41b4a33c4b2d6730baf6
              name: 'predictedFailCount{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.2.1.14.{$SNMPINDEX}'
              key: 'predictedFailCount.[{#SNMPINDEX}]'
              description: |
                MIB:ATEN-IPMI-MIB
                Predicted fail count of the HDD.
              tags:
                - tag: component
                  value: hdd
            - uuid: 425f8a23dcba4800bd678ee4f2a8d7c5
              name: 'revision{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.2.1.9.{$SNMPINDEX}'
              key: 'revision.[{#SNMPINDEX}]'
              value_type: TEXT
              description: |
                MIB:ATEN-IPMI-MIB
                Revision of the HDD.
              tags:
                - tag: component
                  value: hdd
            - uuid: 52d21f01af9e401cb176c04565406dd0
              name: 'sn{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.2.1.10.{$SNMPINDEX}'
              key: 'sn.[{#SNMPINDEX}]'
              value_type: TEXT
              description: |
                MIB:ATEN-IPMI-MIB
                The serial number of the HDD.
              tags:
                - tag: component
                  value: hdd
            - uuid: de55ab4f2a914eaf9748d798a576b3fb
              name: 'status{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.2.1.4.{$SNMPINDEX}'
              key: 'status.[{#SNMPINDEX}]'
              description: |
                MIB:ATEN-IPMI-MIB
                Current status of the HDD.
                1: present
                0: not present
              valuemap:
                name: hdd.status
              tags:
                - tag: component
                  value: hdd
            - uuid: c0dac8fbe11b4ff68f819a0a81101274
              name: 'temperature {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.2.1.5.{$SNMPINDEX}'
              key: 'temperature.[{#SNMPINDEX}]'
              units: °C
              description: |
                MIB:ATEN-IPMI-MIB
                Current temperature of the HDD.
              tags:
                - tag: component
                  value: hdd
            - uuid: b35602d1ead7483c9bc954db6cc7c463
              name: 'vendor{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.2.1.7.{$SNMPINDEX}'
              key: 'vendor.[{#SNMPINDEX}]'
              value_type: TEXT
              description: |
                MIB:ATEN-IPMI-MIB
                The vendor of the HDD.
              tags:
                - tag: component
                  value: hdd
        - uuid: c03c556ed8e441099513aaacaf4a3752
          name: 'Temperature Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.4.1.21317.1.3.1.2,{#SENSOR_DESCR},1.3.6.1.4.1.21317.1.3.1.13]'
          key: tempDescr.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#SENSOR_DESCR}'
                value: '.*Temp.*'
              - macro: '{#SNMPVALUE}'
                value: '[1-9]+'
          description: 'Scanning ATEN-IPMI-MIB::sensorTable with filter: not connected temp sensors (Value = 0)'
          item_prototypes:
            - uuid: fe3acdb63d884c10bc5abe7edf001ceb
              name: '{#SENSOR_DESCR}: Temperature'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.21317.1.3.1.2.{#SNMPINDEX}]'
              key: 'sensor.temp.value[sensorReading.{#SNMPINDEX}]'
              delay: 3m
              value_type: FLOAT
              units: °C
              description: |
                MIB: ATEN-IPMI-MIB
                A textual string containing information about the interface.
                This string should include the name of the manufacturer, the product name and the version of the interface hardware/software.
              tags:
                - tag: component
                  value: temperature
              trigger_prototypes:
                - uuid: 1a48aee477d54d34bdea47fc6027968c
                  expression: 'avg(/Supermicro Aten by SNMP/sensor.temp.value[sensorReading.{#SNMPINDEX}],5m)>{$TEMP_CRIT:"{#SENSOR_DESCR}"}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'max(/Supermicro Aten by SNMP/sensor.temp.value[sensorReading.{#SNMPINDEX}],5m)<{$TEMP_CRIT:"{#SENSOR_DESCR}"}-3'
                  name: 'Supermicro Aten: {#SENSOR_DESCR}: Temperature is above critical threshold'
                  event_name: 'Supermicro Aten: {#SENSOR_DESCR}: Temperature is above critical threshold: >{$TEMP_CRIT:"{#SENSOR_DESCR}"}'
                  opdata: 'Current value: {ITEM.LASTVALUE1}'
                  priority: HIGH
                  description: 'This trigger uses temperature sensor values as well as temperature sensor status if available'
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
                - uuid: 2c2914d1c8c846d180ee308fa861540e
                  expression: 'avg(/Supermicro Aten by SNMP/sensor.temp.value[sensorReading.{#SNMPINDEX}],5m)>{$TEMP_WARN:"{#SENSOR_DESCR}"}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'max(/Supermicro Aten by SNMP/sensor.temp.value[sensorReading.{#SNMPINDEX}],5m)<{$TEMP_WARN:"{#SENSOR_DESCR}"}-3'
                  name: 'Supermicro Aten: {#SENSOR_DESCR}: Temperature is above warning threshold'
                  event_name: 'Supermicro Aten: {#SENSOR_DESCR}: Temperature is above warning threshold: >{$TEMP_WARN:"{#SENSOR_DESCR}"}'
                  opdata: 'Current value: {ITEM.LASTVALUE1}'
                  priority: WARNING
                  description: 'This trigger uses temperature sensor values as well as temperature sensor status if available'
                  manual_close: 'YES'
                  dependencies:
                    - name: 'Supermicro Aten: {#SENSOR_DESCR}: Temperature is above critical threshold'
                      expression: 'avg(/Supermicro Aten by SNMP/sensor.temp.value[sensorReading.{#SNMPINDEX}],5m)>{$TEMP_CRIT:"{#SENSOR_DESCR}"}'
                      recovery_expression: 'max(/Supermicro Aten by SNMP/sensor.temp.value[sensorReading.{#SNMPINDEX}],5m)<{$TEMP_CRIT:"{#SENSOR_DESCR}"}-3'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
                - uuid: 1439e7a34bbf4046836890f208f99a48
                  expression: 'avg(/Supermicro Aten by SNMP/sensor.temp.value[sensorReading.{#SNMPINDEX}],5m)<{$TEMP_CRIT_LOW:"{#SENSOR_DESCR}"}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'min(/Supermicro Aten by SNMP/sensor.temp.value[sensorReading.{#SNMPINDEX}],5m)>{$TEMP_CRIT_LOW:"{#SENSOR_DESCR}"}+3'
                  name: 'Supermicro Aten: {#SENSOR_DESCR}: Temperature is too low'
                  event_name: 'Supermicro Aten: {#SENSOR_DESCR}: Temperature is too low: <{$TEMP_CRIT_LOW:"{#SENSOR_DESCR}"}'
                  opdata: 'Current value: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
        - uuid: 0dbc93e576ce4a0090db49ba0826590a
          name: 'VOL Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPINDEX},1.3.6.1.4.1.21317.1.7.3.1.1]'
          key: vol.discovery
          delay: 12h
          description: 'MIB:ATEN-IPMI-MIB'
          item_prototypes:
            - uuid: 482f77c014d24bd2be6ed7d61c29debb
              name: 'ldStripSize{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.21317.1.7.3.1.8.{$SNMPINDEX}'
              key: 'ldStripSize[{#SNMPINDEX}]'
              description: |
                MIB:ATEN-IPMI-MIB
                LD strip size of the volume.
                (per DDF: 4=8K, 5=16K, 7=64K, 11=1MB, etc.)
              tags:
                - tag: component
                  value: volume
            - uuid: 1bb1e4d4d3854d779c3cb2d067009208
              name: 'numDevices{#SNMPINDEX}'
